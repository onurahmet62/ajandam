databases:
  - name: ajandam-db
    plan: free
    databaseName: ajandam
    user: ajandam_user

services:
  - type: web
    name: ajandam-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: DATABASE_URL
        fromDatabase:
          name: ajandam-db
          property: connectionString
